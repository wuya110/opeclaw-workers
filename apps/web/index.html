<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>院生 AI 实验站</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>院生 AI 实验站</h1>
      <p class="sub">Cloudflare × GitHub × Hugging Face 统一实验入口</p>

      <section class="card">
        <h2>网关配置</h2>
        <label for="gatewayBase">网关地址</label>
        <input id="gatewayBase" value="https://api.yjs.de5.net" />
        <button id="saveGatewayBtn">保存网关地址</button>
        <pre id="gatewayInfoBox">默认使用 https://api.yjs.de5.net</pre>
      </section>

      <section class="card">
        <div class="history-head">
          <h2>状态总面板</h2>
          <button id="loadDashboardBtn">刷新状态</button>
        </div>
        <div id="dashboardBox" class="dashboard-grid">等待加载...</div>
      </section>

      <section class="card">
        <div class="history-head">
          <h2>资产区</h2>
          <div class="inline-actions">
            <button id="saveAnswerAssetBtn">保存当前回答</button>
            <button id="loadAssetsBtn">刷新资产</button>
          </div>
        </div>
        <div class="asset-form">
          <input id="assetName" placeholder="资产名称，例如：今日结论" />
        </div>
        <div id="assetsBox" class="history-box">等待加载...</div>
        <div id="assetDetailBox" class="asset-detail-box">点击某条资产查看详情...</div>
      </section>

      <section class="card">
        <h2>连通状态</h2>
        <button id="checkBtn">检查网关状态</button>
        <pre id="statusBox">等待检查...</pre>
      </section>

      <section class="card">
        <div class="history-head">
          <h2>Prompt 模板</h2>
          <div class="inline-actions">
            <input id="templateSearch" placeholder="搜索模板标题 / 内容 / 分类" />
            <select id="templateCategoryFilter">
              <option value="">全部分类</option>
            </select>
            <select id="templateFavoriteFilter">
              <option value="">全部</option>
              <option value="true">只看收藏</option>
            </select>
          </div>
        </div>
        <div id="templateBox" class="template-grid"></div>
      </section>

      <section class="card">
        <h2>文本实验</h2>
        <label for="model">选择模型</label>
        <select id="model">
          <option value="Qwen/Qwen2.5-72B-Instruct">Qwen/Qwen2.5-72B-Instruct</option>
          <option value="meta-llama/Llama-3.3-70B-Instruct">meta-llama/Llama-3.3-70B-Instruct</option>
          <option value="openai/gpt-oss-120b">openai/gpt-oss-120b</option>
          <option value="Qwen/Qwen3-32B">Qwen/Qwen3-32B</option>
        </select>

        <label for="fallbackModel">回退模型</label>
        <select id="fallbackModel">
          <option value="meta-llama/Llama-3.3-70B-Instruct">meta-llama/Llama-3.3-70B-Instruct</option>
          <option value="Qwen/Qwen2.5-72B-Instruct">Qwen/Qwen2.5-72B-Instruct</option>
          <option value="Qwen/Qwen3-32B">Qwen/Qwen3-32B</option>
        </select>

        <label for="prompt">输入内容</label>
        <textarea id="prompt" placeholder="输入一句要让模型处理的文本"></textarea>

        <div class="row">
          <div class="col">
            <label for="maxTokens">max_tokens</label>
            <input id="maxTokens" type="number" value="256" min="1" max="4096" />
          </div>
          <div class="col">
            <label for="temperature">temperature</label>
            <input id="temperature" type="number" value="0.7" min="0" max="2" step="0.1" />
          </div>
        </div>

        <div class="action-row">
          <button id="runBtn">发送到 Worker 网关</button>
          <button id="copyAnswerBtn" class="secondary">复制回答</button>
          <button id="clearPromptBtn" class="secondary">清空输入</button>
        </div>

        <div class="answer-panel">
          <div class="answer-head">
            <h3>回答</h3>
            <span id="metaTag" class="meta-tag">等待执行</span>
          </div>
          <div id="answerBox" class="answer-box">等待执行...</div>
          <div id="resultSummaryBox" class="result-summary">等待结果摘要...</div>
        </div>

        <details class="raw-panel">
          <summary>查看原始 JSON</summary>
          <pre id="resultBox">等待执行...</pre>
        </details>
      </section>

      <section class="card">
        <div class="history-head">
          <h2>实验记录</h2>
          <div class="inline-actions">
            <input id="historySearch" placeholder="搜索 prompt / answer / 模型" />
            <select id="historyFallbackFilter">
              <option value="">全部</option>
              <option value="true">只看回退</option>
              <option value="false">只看直出</option>
            </select>
            <input id="historyLimit" type="number" value="10" min="1" max="100" />
            <button id="loadHistoryBtn">刷新记录</button>
          </div>
        </div>
        <div id="historyBox" class="history-box">等待加载...</div>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
