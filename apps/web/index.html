<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>院生 AI 实验站</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>院生 AI 实验站</h1>
      <p class="sub">Cloudflare × GitHub × Hugging Face 统一实验入口</p>

      <section class="card">
        <h2>连通状态</h2>
        <button id="checkBtn">检查网关状态</button>
        <pre id="statusBox">等待检查...</pre>
      </section>

      <section class="card">
        <h2>文本实验</h2>
        <label for="prompt">输入内容</label>
        <textarea id="prompt" placeholder="输入一句要让模型处理的文本"></textarea>
        <button id="runBtn">发送到 Worker 网关</button>
        <pre id="resultBox">等待执行...</pre>
      </section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
